<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>CastagneMC</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#1a1a1a;
color:#e8e1d6;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{

position:fixed;
top:0;
width:100%;
height:70px;

background:rgba(25,25,25,0.9);
backdrop-filter:blur(8px);

display:flex;
align-items:center;

padding:0 40px;

border-bottom:1px solid rgba(200,170,120,0.2);

z-index:100;

}

/* LOGO */

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:22px;
font-weight:bold;
color:#e6d3b3;
}

.logo img{
height:45px;
}

/* MENU */

.menu{

margin-left:80px;
display:flex;
gap:30px;

}

.menu a{

text-decoration:none;
color:#bfbfbf;
font-weight:bold;

padding:8px 14px;

border-radius:6px;

transition:0.25s;

}

.menu a:hover{

color:#e6d3b3;

text-shadow:
0 0 10px #c8a878,
0 0 20px #c8a878;

}

/* BOUTON ACTIF */

.active{

color:#fff;

background:rgba(200,170,120,0.15);

box-shadow:

0 0 10px rgba(200,170,120,0.7),
0 0 25px rgba(200,170,120,0.4);

}

/* HERO */

.hero{

height:100vh;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

text-align:center;

padding-top:80px;

}

.hero h1{

font-size:65px;

color:#e6d3b3;

letter-spacing:2px;

margin-bottom:15px;

text-shadow:

0 0 15px rgba(200,170,120,0.6);

}

.hero p{

max-width:600px;

font-size:18px;

color:#cfcfcf;

}

/* IP BOX */

.ip-box{

margin-top:50px;

background:rgba(200,170,120,0.08);

border:1px solid rgba(200,170,120,0.4);

padding:20px 40px;

border-radius:10px;

font-size:24px;

font-weight:bold;

cursor:pointer;

transition:0.3s;

color:#e6d3b3;

}

.ip-box:hover{

transform:scale(1.05);

box-shadow:

0 0 15px rgba(200,170,120,0.8),

0 0 40px rgba(200,170,120,0.4);

}

/* MESSAGE COPIE */

.copy-msg{

margin-top:15px;

font-size:14px;

color:#c8a878;

opacity:0;

transition:0.4s;

}

/* BACKGROUND WAVES */

.wave{

position:fixed;

bottom:-120px;

left:0;

width:200%;

height:400px;

background:rgba(200,170,120,0.05);

border-radius:45%;

animation:wave 20s linear infinite;

}

.wave:nth-child(2){

animation-duration:30s;

opacity:0.4;

}

.wave:nth-child(3){

animation-duration:40s;

opacity:0.25;

}

@keyframes wave{

0%{transform:translateX(0);}
50%{transform:translateX(-25%) translateY(-25px);}
100%{transform:translateX(-50%);}

}

/* FOOTER */

footer{

position:absolute;

bottom:15px;

width:100%;

text-align:center;

font-size:14px;

color:#888;

}

</style>

</head>

<body>

<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<div class="navbar">

<div class="logo">
<img src="logo.png">
CastagneMC
</div>

<div class="menu">

<a href="accueil.html" class="active">Accueil</a>
<a href="statistique.html">Statistique</a>
<a href="classement.html">Classement</a>
<a href="vote.html">Vote</a>
<a href="forum.html">Forum</a>

</div>

</div>

<section class="hero">

<h1>CastagneMC</h1>

<p>
Serveur Minecraft Practice 1.8 Crack dédié aux meilleurs joueurs PvP.
Affronte d'autres combattants et deviens le meilleur du serveur.
</p>

<div class="ip-box" onclick="copyIP()">
play.castagnemc.ovh
</div>

<div class="copy-msg" id="msg">
IP copiée dans le presse-papiers !
</div>

</section>

<footer>
© 2026 CastagneMC
</footer>

<script>

function copyIP(){

navigator.clipboard.writeText("play.castagnemc.ovh")

let msg = document.getElementById("msg")

msg.style.opacity = "1"

setTimeout(()=>{
msg.style.opacity="0"
},2000)

}

</script>

</body>
</html>

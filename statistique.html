<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>CastagneMC - Statistiques</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#1a1a1a;
color:#e8e1d6;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
background:rgba(25,25,25,0.9);
backdrop-filter:blur(8px);
display:flex;
align-items:center;
padding:0 40px;
border-bottom:1px solid rgba(200,170,120,0.2);
z-index:100;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:22px;
font-weight:bold;
color:#e6d3b3;
}

.logo img{
height:45px;
}

.menu{
margin-left:80px;
display:flex;
gap:30px;
}

.menu a{
text-decoration:none;
color:#bfbfbf;
font-weight:bold;
padding:8px 14px;
border-radius:6px;
transition:0.25s;
}

.menu a:hover{
color:#e6d3b3;
text-shadow:
0 0 10px #c8a878,
0 0 20px #c8a878;
}

.active{
color:#fff;
background:rgba(200,170,120,0.15);
box-shadow:
0 0 10px rgba(200,170,120,0.7),
0 0 25px rgba(200,170,120,0.4);
}

/* TITRE */

.title{
margin-top:120px;
text-align:center;
}

.title h1{
font-size:50px;
color:#e6d3b3;
text-shadow:0 0 15px rgba(200,170,120,0.6);
}

/* STATS GRID */

.stats{

width:80%;
margin:60px auto;

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;

}

.stat-box{

background:rgba(255,255,255,0.03);

border-radius:12px;

padding:40px;

text-align:center;

border:1px solid rgba(200,170,120,0.2);

transition:0.3s;

}

.stat-box:hover{

transform:scale(1.05);

box-shadow:

0 0 20px rgba(200,170,120,0.5);

}

.stat-number{

font-size:40px;
font-weight:bold;

color:#e6d3b3;

margin-top:10px;

}

.stat-title{

color:#bbb;

font-size:18px;

}

/* WAVES */

.wave{
position:fixed;
bottom:-120px;
left:0;
width:200%;
height:400px;
background:rgba(200,170,120,0.05);
border-radius:45%;
animation:wave 20s linear infinite;
}

.wave:nth-child(2){
animation-duration:30s;
opacity:0.4;
}

.wave:nth-child(3){
animation-duration:40s;
opacity:0.25;
}

@keyframes wave{
0%{transform:translateX(0);}
50%{transform:translateX(-25%) translateY(-25px);}
100%{transform:translateX(-50%);}
}

footer{
margin-top:40px;
text-align:center;
color:#888;
padding-bottom:20px;
}

</style>

</head>

<body>

<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<div class="navbar">

<div class="logo">
<img src="logo.png">
CastagneMC
</div>

<div class="menu">

<a href="accueil.html">Accueil</a>
<a href="statistique.html" class="active">Statistique</a>
<a href="classement.html">Classement</a>
<a href="vote.html">Vote</a>
<a href="forum.html">Forum</a>

</div>

</div>

<div class="title">
<h1>Statistiques du Serveur</h1>
</div>

<div class="stats">

<div class="stat-box">
<div class="stat-title">Joueurs inscrits</div>
<div class="stat-number" data-target="6">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Total Kills</div>
<div class="stat-number" data-target="124">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Meilleur MMR</div>
<div class="stat-number" data-target="N/A">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Record Killstreak</div>
<div class="stat-number" data-target="23">0</div>
</div>

<div class="stat-box">
<div class="stat-title">Meilleur Joueur</div>
<div class="stat-number" data-target="">Azd_</div>
</div>

<div class="stat-box">
<div class="stat-title">Joueurs en ligne</div>
<div class="stat-number" data-target="0">0</div>
</div>

</div>

<footer>
© 2026 CastagneMC
</footer>

<script>

const counters = document.querySelectorAll(".stat-number")

counters.forEach(counter => {

const update = () => {

const target = +counter.getAttribute("data-target")
const count = +counter.innerText

const increment = target / 200

if(count < target){

counter.innerText = Math.ceil(count + increment)

setTimeout(update,10)

}else{

counter.innerText = target

}

}

update()

})

</script>

</body>
</html>
